<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admins Tools - Yeshivat Torat Yosef</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="/favicon/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto w-full max-w-5xl px-4 pb-16 pt-8 md:px-6">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
      <h1 class="text-3xl font-bold tracking-tight md:text-4xl">Admins Tools</h1>
      <p class="mt-3 text-slate-600">Create and share referral codes quickly for campaigns and partners.</p>
    </section>

    <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
      <h2 class="text-xl font-bold text-slate-900">Referral Code Generator</h2>
      <p class="mt-2 text-sm text-slate-600">Generate a referrer code, then copy the code and shareable URL.</p>

      <div class="mt-4 grid gap-4 md:grid-cols-2">
        <label class="text-sm font-semibold text-slate-700">
          Referrer Name (optional)
          <input id="referrer-name" type="text" placeholder="Example: Joey Mizrahi" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-0 focus:border-rose-400" />
        </label>

        <label class="text-sm font-semibold text-slate-700">
          Prefix (optional)
          <input id="ref-prefix" type="text" placeholder="Example: TY" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 uppercase outline-none ring-0 focus:border-rose-400" maxlength="6" />
        </label>
      </div>

      <div class="mt-4 flex flex-wrap gap-3">
        <button id="generate-code" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700">Generate Code</button>
        <button id="copy-code" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition hover:bg-slate-100">Copy Code</button>
        <button id="copy-link" class="rounded-lg border border-rose-300 bg-rose-50 px-4 py-2 text-sm font-semibold text-rose-800 transition hover:bg-rose-100">Copy Referral Link</button>
      </div>

      <div class="mt-5 grid gap-4 md:grid-cols-2">
        <div>
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Referral Code</p>
          <p id="code-output" class="mt-1 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 font-mono text-sm text-slate-900">-</p>
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Referral Link</p>
          <p id="link-output" class="mt-1 break-all rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 font-mono text-sm text-slate-900">-</p>
        </div>
      </div>

      <p id="status-msg" class="mt-3 text-sm font-semibold text-emerald-700"></p>
    </section>

    <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
      <h2 class="text-xl font-bold text-slate-900">Quick Admin Links</h2>
      <div class="mt-4 grid gap-3 md:grid-cols-3">
        <a href="./dashboard.html" class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-800 hover:bg-slate-100">Open Dashboard</a>
        <a href="./admin-create.html" class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-800 hover:bg-slate-100">Create Accounts</a>
        <a href="./export.html" class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-800 hover:bg-slate-100">Export Data</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const codeOutput = document.getElementById('code-output');
      const linkOutput = document.getElementById('link-output');
      const statusMsg = document.getElementById('status-msg');
      const nameInput = document.getElementById('referrer-name');
      const prefixInput = document.getElementById('ref-prefix');

      function randomPart(length) {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let out = '';
        for (let i = 0; i < length; i += 1) {
          out += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return out;
      }

      function cleanToken(value) {
        return (value || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
      }

      function makeCode() {
        const prefix = cleanToken(prefixInput.value).slice(0, 6);
        const nameToken = cleanToken(nameInput.value).slice(0, 4);
        const dynamic = randomPart(5);
        return [prefix || 'TY', nameToken || 'REF', dynamic].join('-');
      }

      function buildLink(code) {
        return window.location.origin + '/prizes.html?ref=' + encodeURIComponent(code) + '';
      }

      function setOutputs(code) {
        const link = buildLink(code);
        codeOutput.textContent = code;
        linkOutput.textContent = link;
      }

      function setStatus(text, isError) {
        statusMsg.textContent = text;
        statusMsg.className = 'mt-3 text-sm font-semibold ' + (isError ? 'text-rose-700' : 'text-emerald-700');
      }

      document.getElementById('generate-code').addEventListener('click', function () {
        const code = makeCode();
        setOutputs(code);
        setStatus('Referral code generated.', false);
      });

      document.getElementById('copy-code').addEventListener('click', async function () {
        const code = codeOutput.textContent.trim();
        if (!code || code === '-') {
          setStatus('Generate a code first.', true);
          return;
        }
        await navigator.clipboard.writeText(code);
        setStatus('Referral code copied.', false);
      });

      document.getElementById('copy-link').addEventListener('click', async function () {
        const link = linkOutput.textContent.trim();
        if (!link || link === '-') {
          setStatus('Generate a code first.', true);
          return;
        }
        await navigator.clipboard.writeText(link);
        setStatus('Referral link copied.', false);
      });

      setOutputs(makeCode());
    })();
  </script>
  <script defer src="/scripts/layout.js"></script>
</body>
</html>
