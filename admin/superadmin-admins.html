<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Admin - Create Admins</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="/favicon/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto w-full max-w-3xl px-4 pb-16 pt-8 md:px-6">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
      <h1 class="text-3xl font-bold tracking-tight">Super Admin: Create Admin</h1>
      <p class="mt-2 text-sm text-slate-600">Locked page. Only users with superAdminReferrer claim can create admins.</p>

      <p id="status" class="mt-4 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">Checking access...</p>

      <form id="create-admin-form" class="mt-6 space-y-4">
        <label class="block text-sm font-semibold text-slate-700">
          Full Name
          <input id="name" type="text" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-rose-500" required />
        </label>

        <label class="block text-sm font-semibold text-slate-700">
          Email Prefix
          <div class="mt-1 flex overflow-hidden rounded-lg border border-slate-300 focus-within:border-rose-500">
            <input id="email-prefix" type="text" class="w-full px-3 py-2 outline-none" placeholder="morrise" required />
            <span class="inline-flex items-center bg-slate-100 px-3 text-xs text-slate-600">@toratyosefsummerraffle.com</span>
          </div>
        </label>

        <label class="block text-sm font-semibold text-slate-700">
          Password
          <input id="password" type="password" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-rose-500" minlength="6" required />
        </label>

        <label class="block text-sm font-semibold text-slate-700">
          Goal (optional)
          <input id="goal" type="number" min="0" step="1" value="300" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-rose-500" />
        </label>

        <button id="submit" type="submit" class="inline-flex rounded-lg bg-rose-700 px-5 py-2.5 text-sm font-semibold text-white hover:bg-rose-800 disabled:cursor-not-allowed disabled:opacity-60">Create Admin</button>
      </form>

      <div id="result" class="mt-4 text-sm"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDfXnCZXN-URjdvFvVlWHLg4KOkSw7hvng",
      authDomain: "torat-yose.firebaseapp.com",
      projectId: "torat-yose",
      storageBucket: "torat-yose.firebasestorage.app",
      messagingSenderId: "1033400220494",
      appId: "1:1033400220494:web:1437414bdad4439fd6bc1f",
      measurementId: "G-331D9RHZWH"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const functions = firebase.functions();
    const createAdminAccount = functions.httpsCallable('createAdminAccount');

    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const form = document.getElementById('create-admin-form');
    const submitButton = document.getElementById('submit');

    function setStatus(text, tone) {
      statusEl.textContent = text;
      statusEl.className = 'mt-4 rounded-lg border px-3 py-2 text-sm';
      if (tone === 'error') {
        statusEl.classList.add('border-rose-200', 'bg-rose-50', 'text-rose-700');
      } else if (tone === 'ok') {
        statusEl.classList.add('border-emerald-200', 'bg-emerald-50', 'text-emerald-700');
      } else {
        statusEl.classList.add('border-slate-200', 'bg-slate-50', 'text-slate-700');
      }
    }

    function sanitizePrefix(value) {
      return String(value || '').toLowerCase().replace(/[^a-z0-9._-]/g, '');
    }

    document.getElementById('email-prefix').addEventListener('input', function () {
      const cleaned = sanitizePrefix(this.value);
      if (this.value !== cleaned) {
        this.value = cleaned;
      }
    });

    form.classList.add('hidden');
    auth.onAuthStateChanged(async function (user) {
      resultEl.textContent = '';
      if (!user) {
        setStatus('Please login first. Redirecting to login page...', 'error');
        setTimeout(function () {
          window.location.href = './login.html';
        }, 900);
        return;
      }

      const token = await user.getIdTokenResult(true);
      if (!token.claims || token.claims.superAdminReferrer !== true) {
        setStatus('Access denied. This page is for Super Admin Referrers only.', 'error');
        form.classList.add('hidden');
        return;
      }

      setStatus('Access granted. You can create admin accounts.', 'ok');
      form.classList.remove('hidden');
    });

    form.addEventListener('submit', async function (event) {
      event.preventDefault();
      resultEl.textContent = '';

      const name = document.getElementById('name').value.trim();
      const emailPrefix = sanitizePrefix(document.getElementById('email-prefix').value);
      const password = document.getElementById('password').value;
      const goal = parseInt(document.getElementById('goal').value, 10);

      if (!name || !emailPrefix || !password) {
        resultEl.className = 'mt-4 text-sm text-rose-700';
        resultEl.textContent = 'Name, email prefix, and password are required.';
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = 'Creating...';

      try {
        const response = await createAdminAccount({
          name,
          emailPrefix,
          password,
          goal: Number.isFinite(goal) ? goal : 300
        });

        const data = response.data || {};
        resultEl.className = 'mt-4 text-sm text-emerald-700';
        resultEl.textContent = `${data.message} Email: ${data.email} | Ref ID: ${data.refId}`;
        form.reset();
        document.getElementById('goal').value = '300';
      } catch (error) {
        resultEl.className = 'mt-4 text-sm text-rose-700';
        resultEl.textContent = error && error.message ? error.message : 'Failed to create admin.';
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Create Admin';
      }
    });
  </script>
  <script defer src="/scripts/layout.js"></script>
</body>
</html>
