<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0;url=/admin" />
</head>
<body>
  <script>
    (function () {
      var query = window.location.search || '';
      window.location.replace('/admin' + query);
    })();
  </script>
</body>
</html>
