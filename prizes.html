<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prizes - Yeshivat Torat Yosef</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="favicon/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto w-full max-w-6xl px-4 pb-16 pt-8 md:px-6">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
      <h1 class="text-3xl font-bold tracking-tight md:text-4xl">Raffle Prizes</h1>
      <p class="mt-3 max-w-3xl text-slate-600">
        One winning ticket takes both prizes. Ticket price is <span class="font-semibold text-rose-700">$126</span>.
      </p>
      <a id="buy-top-link" href="checkout.html" class="mt-5 inline-flex rounded-lg bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-700">Buy Tickets</a>
    </section>

    <section class="mt-6 grid gap-6 md:grid-cols-2">
      <article class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="aspect-[4/3] w-full bg-slate-200">
          <img src="https://media.rolex.com/image/upload/q_auto:eco/f_auto/t_v7-majesty/c_limit,w_1600/v1/catalogue/2025/upright-c/m126334-0026" alt="Rolex Datejust 41" class="h-full w-full object-cover" />
        </div>
        <div class="p-5">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Prize 1</p>
          <h2 class="mt-1 text-2xl font-bold text-slate-900">Rolex Datejust 41</h2>
          <p class="mt-2 text-slate-600">Oyster, 41 mm, Oystersteel.</p>
        </div>
      </article>

      <article class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="aspect-[4/3] w-full bg-slate-200">
          <img src="https://images.unsplash.com/photo-1580048915913-4f8f5cb481c4?auto=format&fit=crop&w=1200&q=80" alt="$10,000 cash" class="h-full w-full object-cover" />
        </div>
        <div class="p-5">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Prize 2</p>
          <h2 class="mt-1 text-2xl font-bold text-slate-900">$10,000 Cash</h2>
          <p class="mt-2 text-slate-600">One winner receives both the Rolex and the cash prize.</p>
        </div>
      </article>
    </section>

    <div class="mt-8 text-center">
      <a id="buy-bottom-link" href="checkout.html" class="inline-flex rounded-lg bg-rose-700 px-6 py-3 text-sm font-semibold text-white transition hover:bg-rose-800">Enter Now - $126 Per Ticket</a>
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref');
      if (ref) {
        const top = document.getElementById('buy-top-link');
        const bottom = document.getElementById('buy-bottom-link');
        top.href += '?ref=' + encodeURIComponent(ref);
        bottom.href += '?ref=' + encodeURIComponent(ref);
      }
    })();
  </script>
  <script defer src="/scripts/layout.js"></script>
</body>
</html>
