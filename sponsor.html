<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponsorship Opportunities - Yeshivat Torat Yosef</title>
  <link rel="icon" href="favicon/favicon.ico" />
  <meta name="theme-color" content="#ffffff" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto w-full max-w-6xl px-4 pb-16 pt-8 md:px-6">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm md:p-8">
      <h1 class="text-3xl font-bold tracking-tight md:text-4xl">Sponsorship Opportunities</h1>
      <p class="mt-3 max-w-3xl text-slate-600">
        Partner with Yeshivat Torat Yosef and dedicate meaningful spaces and programs for future generations.
      </p>
      <div id="referral-info" class="mt-4 hidden rounded-lg border-l-4 border-slate-800 bg-slate-100 p-3 text-sm text-slate-700"></div>
    </section>

    <section id="sponsor-grid" class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></section>

    <section class="mt-8 rounded-2xl border border-slate-200 bg-white p-6 text-center shadow-sm">
      <p class="text-lg font-semibold text-slate-900">Interested in sponsoring?</p>
      <p class="mt-2 text-slate-600">Contact us and we will help you choose the right dedication opportunity.</p>
      <a id="ticket-link" href="prizes.html" class="mt-5 inline-flex rounded-lg bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-700">
        Purchase Tickets
      </a>
    </section>
  </main>

  <script>
    const sponsorshipData = [
      { title: 'School Building Name', amount: '$1,000,000', status: 'AVAILABLE', image: 'assets/sponsor3.png' },
      { title: 'Auditorium', amount: '$1,000,000', status: 'AVAILABLE', image: 'assets/sponsor4.png' },
      { title: 'Bet Midrash Naming', amount: '$500,000', status: 'AVAILABLE', image: 'assets/sponsor6.png' },
      { title: 'Kitchen', amount: '$250,000', status: 'AVAILABLE', image: 'assets/sponsor9.png' },
      { title: 'Playground', amount: '$250,000', status: 'AVAILABLE', image: 'assets/sponsor13.png' },
      { title: 'Basketball Court', amount: '$250,000', status: 'AVAILABLE', image: 'assets/sponsor14.png' },
      { title: 'Classroom Sponsorship', amount: '$72,000 per classroom', status: 'AVAILABLE', image: 'assets/sponsor15.png' },
      { title: 'Front Door Mezuzah', amount: '$26,000', status: 'AVAILABLE', image: 'assets/sponsor16.png' },
      { title: 'Campus Lake with Nature Center', amount: '$250,000', status: 'AVAILABLE', image: 'assets/sponsor18.png' }
    ];

    function getUrlParameter(name) {
      const escaped = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      const regex = new RegExp('[\\?&]' + escaped + '=([^&#]*)');
      const results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    function createCard(item) {
      const available = item.status === 'AVAILABLE';
      const badgeClasses = available
        ? 'bg-emerald-100 text-emerald-800'
        : 'bg-rose-100 text-rose-800';

      return `
        <article class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
          <div class="aspect-[4/3] w-full bg-slate-200">
            <img src="${item.image}" alt="${item.title}" class="h-full w-full object-cover" onerror="this.onerror=null;this.src='https://placehold.co/800x600/e2e8f0/334155?text=Sponsorship';" />
          </div>
          <div class="p-4">
            <p class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ${badgeClasses}">${item.status}</p>
            <h2 class="mt-2 text-lg font-bold text-slate-900">${item.title}</h2>
            <p class="mt-1 text-sm text-slate-600">${item.amount}</p>
          </div>
        </article>
      `;
    }

    document.addEventListener('DOMContentLoaded', function () {
      const grid = document.getElementById('sponsor-grid');
      grid.innerHTML = sponsorshipData.map(createCard).join('');

      const ref = getUrlParameter('ref');
      if (ref) {
        const referralInfo = document.getElementById('referral-info');
        referralInfo.classList.remove('hidden');
        referralInfo.innerHTML = '<strong>You were referred by:</strong> ' + ref;

        const ticketLink = document.getElementById('ticket-link');
        ticketLink.href = 'prizes.html?ref=' + encodeURIComponent(ref) + '';
      }
    });
  </script>
  <script defer src="/scripts/layout.js"></script>
</body>
</html>
