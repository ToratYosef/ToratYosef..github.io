<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yeshivat Torat Yosef - Home</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto w-full max-w-6xl px-4 pb-16 pt-8 md:px-6">
    <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="grid gap-0 lg:grid-cols-2">
        <div class="p-6 md:p-10">
          <p class="mb-3 inline-block rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-rose-700">Yeshivat Torat Yosef Raffle</p>
          <h1 class="text-3xl font-bold leading-tight text-slate-900 md:text-5xl">Support Torah and Enter to Win</h1>
          <p class="mt-4 text-base leading-7 text-slate-600 md:text-lg">
            Every ticket supports Torah learning and gives you a chance to win both featured prizes.
          </p>
          <div class="mt-6 flex flex-wrap gap-3">
            <a id="buy-link" href="prizes.html#checkout-on-page" class="rounded-lg bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-700">Get Tickets</a>
            <a id="prizes-link" href="prizes.html" class="rounded-lg border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-800 transition hover:bg-slate-100">View Prizes</a>
          </div>
        </div>
        <div class="relative min-h-[280px] bg-slate-900 md:min-h-[360px]">
          <div id="slides" class="absolute inset-0">
            <div class="slide absolute inset-0 opacity-100 transition-opacity duration-700">
              <img src="assets/slide1.jpg" alt="Yeshiva event" class="h-full w-full object-cover" />
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-700">
              <img src="assets/slide2.jpg" alt="Learning" class="h-full w-full object-cover" />
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-700">
              <img src="assets/slide3.jpg" alt="Students" class="h-full w-full object-cover" />
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-700">
              <img src="assets/slide4.jpeg" alt="Community" class="h-full w-full object-cover" />
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-700">
              <img src="assets/slide5.jpeg" alt="Yeshiva crowd" class="h-full w-full object-cover" />
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-700">
              <img src="assets/slide6.jpeg" alt="Torah learning hall" class="h-full w-full object-cover" />
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-700">
              <img src="assets/slide7.jpeg" alt="Fundraiser moment" class="h-full w-full object-cover" />
            </div>
            <div class="slide absolute inset-0 opacity-0 transition-opacity duration-700">
              <img src="assets/slide8.jpeg" alt="Community support" class="h-full w-full object-cover" />
            </div>
          </div>
          <div class="absolute bottom-3 left-1/2 flex -translate-x-1/2 gap-2 rounded-full bg-black/35 px-3 py-2 backdrop-blur">
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white" aria-label="Slide 1"></button>
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white/40" aria-label="Slide 2"></button>
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white/40" aria-label="Slide 3"></button>
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white/40" aria-label="Slide 4"></button>
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white/40" aria-label="Slide 5"></button>
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white/40" aria-label="Slide 6"></button>
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white/40" aria-label="Slide 7"></button>
            <button type="button" class="dot h-2.5 w-2.5 rounded-full bg-white/40" aria-label="Slide 8"></button>
          </div>
        </div>
      </div>
    </section>

    <section class="mt-8 grid gap-4 md:grid-cols-4">
      <div class="rounded-xl border border-slate-200 bg-white p-4 text-center shadow-sm">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Ticket</p>
        <p class="mt-1 text-2xl font-bold text-rose-700">$126</p>
      </div>
      <div class="rounded-xl border border-slate-200 bg-white p-4 text-center shadow-sm">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Winner</p>
        <p class="mt-1 text-2xl font-bold text-slate-900">1</p>
      </div>
      <div class="rounded-xl border border-slate-200 bg-white p-4 text-center shadow-sm">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Prize 1</p>
        <p class="mt-1 text-base font-bold text-slate-900">Rolex Datejust 41</p>
      </div>
      <div class="rounded-xl border border-slate-200 bg-white p-4 text-center shadow-sm">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Prize 2</p>
        <p class="mt-1 text-base font-bold text-slate-900">$10,000 Cash</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const slides = Array.from(document.querySelectorAll('.slide'));
      const dots = Array.from(document.querySelectorAll('.dot'));
      let current = 0;

      function show(index) {
        current = (index + slides.length) % slides.length;
        slides.forEach((slide, i) => {
          slide.style.opacity = i === current ? '1' : '0';
        });
        dots.forEach((dot, i) => {
          dot.classList.toggle('bg-white', i === current);
          dot.classList.toggle('bg-white/40', i !== current);
        });
      }

      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => show(i));
      });

      setInterval(() => show(current + 1), 3800);

      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref');
      if (ref) {
        const buyLink = document.getElementById('buy-link');
        const prizesLink = document.getElementById('prizes-link');
        buyLink.href = 'prizes.html?ref=' + encodeURIComponent(ref) + '#checkout-on-page';
        prizesLink.href += '?ref=' + encodeURIComponent(ref);
      }
    })();
  </script>
  <script defer src="/scripts/layout.js"></script>
</body>
</html>
