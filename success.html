<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purchase Successful! - Yeshivat Torat Yosef Raffle</title>
    <link rel="favicon-32x32" href="favicon/favicon.ico" />
    <meta name="theme-color" content="#ffffff" />
    <style>
      .summary-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #edf2f7;
      }

      .summary-row:last-child {
        border-bottom: none;
      }

      .summary-label {
        font-weight: 700;
        color: #334155;
      }

      .summary-value {
        color: #0f172a;
        text-align: right;
        word-break: break-word;
      }
    </style>
  <link rel="stylesheet" href="/assets/tailwind.css" />
</head>
<body class="bg-slate-50 text-slate-900">
    <main class="mx-auto w-full max-w-3xl px-4 pb-16 pt-8 md:px-6">
      <section class="overflow-hidden rounded-2xl border border-emerald-200 bg-gradient-to-br from-emerald-50 to-white p-6 shadow-sm md:p-8">
        <div class="inline-flex items-center gap-2 rounded-full border border-emerald-300 bg-white/80 px-3 py-1 text-xs font-bold uppercase tracking-wide text-emerald-700">Payment Complete</div>
        <h1 class="mt-4 text-3xl font-bold tracking-tight text-slate-900 md:text-4xl">Thank You For Your Purchase</h1>
        <p id="message" class="mt-3 text-slate-700">Your support of Yeshivat Torat Yosef is greatly appreciated. A confirmation and your details have been sent to your email.</p>

        <div id="checkout-summary" class="mt-6 rounded-xl border border-slate-200 bg-white p-4 shadow-sm" style="display: none;">
          <div class="summary-row"><span class="summary-label">Tickets Bought</span><span id="summary-tickets" class="summary-value">-</span></div>
          <div class="summary-row"><span class="summary-label">Amount Spent</span><span id="summary-amount" class="summary-value">-</span></div>
          <div class="summary-row"><span class="summary-label">Payment Method</span><span id="summary-card" class="summary-value">-</span></div>
          <div class="summary-row"><span class="summary-label">Full Name</span><span id="summary-name" class="summary-value">-</span></div>
          <div class="summary-row"><span class="summary-label">Email</span><span id="summary-email" class="summary-value">-</span></div>
          <div class="summary-row"><span class="summary-label">Phone</span><span id="summary-phone" class="summary-value">-</span></div>
        </div>

        <p id="referrer-display" class="mt-5 text-sm font-semibold text-rose-700"></p>

        <div class="mt-6 flex flex-wrap gap-3">
          <a href="index.html" class="inline-flex rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700">Return Home</a>
          <a href="prizes.html" class="inline-flex rounded-lg border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Buy More Tickets</a>
        </div>
      </section>
    </main>

    <script type="module">
        // Import Firebase modules for analytics
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
        import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-analytics.js";

        // Your web app's Firebase configuration
        // IMPORTANT: REPLACE THESE WITH YOUR ACTUAL FIREBASE CONFIG DETAILS
        const firebaseConfig = {
          apiKey: "AIzaSyAVSkxnzvt6jJOSgQcaRFX7tfnPPPeYQvY", // Your actual API Key
          authDomain: "torat-yose.firebaseapp.com", // Your actual Auth Domain
          projectId: "torat-yose", // Your actual Project ID
          storageBucket: "torat-yose.firebasestorage.app", // Your actual Storage Bucket
          messagingSenderId: "1054733969512", // Your actual Messaging Sender ID
          appId: "1:1054733969512:web:9703846085ab15d08c73dd", // Your actual App ID
          measurementId: "G-9RYXQP6NFD" // Your actual Measurement ID
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        document.addEventListener('DOMContentLoaded', () => {
            // Function to parse URL parameters
            function getUrlParameter(name) {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                var results = regex.exec(location.search);
                return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
            }

            const referrerId = getUrlParameter('ref');
            const sessionId = getUrlParameter('session_id');
            const referrerDisplay = document.getElementById('referrer-display');
            const messageDisplay = document.getElementById('message');
            const summaryWrap = document.getElementById('checkout-summary');

            function formatAmount(amount) {
                const value = Number(amount);
                if (Number.isNaN(value)) {
                    return '$0.00';
                }
                return `$${value.toFixed(2)}`;
            }

            function renderCheckoutSummary(details) {
                if (!details || typeof details !== 'object') {
                    return;
                }
                const tickets = details.quantity || '-';
                const amount = formatAmount(details.amount);
                const paymentLabels = {
                    apple_pay: 'Apple Pay',
                    card: 'Card',
                    google_pay: 'Google Pay'
                };
                const methodLabel = paymentLabels[details.paymentMethod] || 'Card';
                const card = details.cardBrand && details.last4
                    ? `${methodLabel} — ${details.cardBrand} •••• ${details.last4}`
                    : methodLabel;

                document.getElementById('summary-tickets').textContent = String(tickets);
                document.getElementById('summary-amount').textContent = amount;
                document.getElementById('summary-card').textContent = card;
                document.getElementById('summary-name').textContent = details.name || '-';
                document.getElementById('summary-email').textContent = details.email || '-';
                document.getElementById('summary-phone').textContent = details.phone || '-';
                summaryWrap.style.display = 'block';
            }

            let checkoutDetails = null;
            try {
                const raw = sessionStorage.getItem('checkoutSuccessDetails');
                if (raw) {
                    checkoutDetails = JSON.parse(raw);
                    sessionStorage.removeItem('checkoutSuccessDetails');
                }
            } catch (_error) {
                checkoutDetails = null;
            }

            renderCheckoutSummary(checkoutDetails);

            // Handle Stripe checkout session success
            if (sessionId) {
                messageDisplay.textContent = `Your payment has been processed successfully! Session ID: ${sessionId}. A confirmation email with your prize entry details has been sent to you.`;
                
                // Log Stripe purchase event
                logEvent(analytics, 'stripe_purchase_success', {
                    session_id: sessionId,
                    referrer: referrerId || 'none'
                });
            } else {
                // Log regular PayPal purchase event or direct visit
                logEvent(analytics, 'checkout_completed', {
                    referrer: referrerId || 'none'
                });
            }

            if (referrerId) {
                referrerDisplay.textContent = `You were referred by: ${referrerId}. Thank you for supporting their efforts!`;
            } else if (checkoutDetails && checkoutDetails.referral && checkoutDetails.referral !== 'direct') {
                referrerDisplay.textContent = `You were referred by: ${checkoutDetails.referral}. Thank you for supporting their efforts!`;
            } else {
                // If no referrer, clear the element's content
                referrerDisplay.textContent = ``; 
            }

            // Log a Firebase Analytics event for successful purchase page view
            logEvent(analytics, 'purchase_success_page_view', { referrer: referrerId || 'none' });

            // This logic ensures that if the user navigates from the success page,
            // the 'ref' parameter (if present) is carried over to other internal links.
            const navLinks = document.querySelectorAll('nav a');
            navLinks.forEach(link => {
                const originalHref = link.getAttribute('href');
                // Only modify internal links and if 'ref' is not already present
                if (referrerId && originalHref && !originalHref.startsWith('http') && !originalHref.includes('ref=')) {
                    const newHref = originalHref.includes('?')
                                     ? `${originalHref}&ref=${referrerId}`
                                     : `${originalHref}?ref=${referrerId}`;
                    link.href = newHref;
                }
            });
        });
    </script>
  <script defer src="/scripts/layout.js"></script>
</body>
</html>
